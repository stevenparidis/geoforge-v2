<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeoForge — Plain-English Structural Geology Modeller</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #0a0c10;
    --bg-1: #0f1218;
    --bg-2: #151921;
    --bg-3: #1c2230;
    --line: #232a38;
    --line-2: #2e3648;
    --fg-0: #f3efe7;
    --fg-1: #c9c4b8;
    --fg-2: #8a8578;
    --fg-3: #5a5648;
    --accent: #67e8f9;       /* cyan — overlay arcs & geometry origins */
    --accent-2: #a3e4ff;
    --inferred: #f59e0b;     /* amber — inferred values */
    --warn: #f97316;
    --ok: #5fd49a;
    --bad: #ef6262;
    --kbd: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --hw: #d68fff;              /* hanging-wall tag (purple) */
    --fw: #80e0c0;              /* footwall tag (teal) */
    --age-old: #1c2230;         /* age ramp: oldest (darkest) */
    --age-mid: #3a4659;
    --age-young: #9eb1ce;       /* age ramp: youngest (lightest) */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg-0);
    color: var(--fg-0);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100vh; }

  /* App shell */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    position: relative;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand .mark {
    width: 22px; height: 22px;
    border: 1.5px solid var(--accent);
    transform: rotate(45deg);
    position: relative;
  }
  .brand .mark::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: var(--accent);
    opacity: 0.25;
  }
  .brand-sub {
    font-family: var(--kbd);
    font-size: 11px;
    color: var(--fg-2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-2);
    padding: 3px;
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .tab {
    appearance: none;
    background: transparent;
    color: var(--fg-2);
    border: 0;
    padding: 5px 14px;
    font: inherit;
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .tab.active {
    background: var(--bg-3);
    color: var(--fg-0);
    box-shadow: 0 0 0 1px var(--line-2);
  }
  .tab:hover:not(.active) { color: var(--fg-1); }

  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    appearance: none;
    background: var(--bg-2);
    color: var(--fg-1);
    border: 1px solid var(--line);
    padding: 6px 12px;
    font: inherit;
    font-size: 12.5px;
    border-radius: 5px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--bg-3); color: var(--fg-0); }
  .btn.primary { background: var(--accent); color: #04161a; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { background: var(--accent-2); }
  .btn.danger { color: var(--bad); }
  .btn.icon { padding: 6px 8px; }

  .view { height: 100%; overflow: hidden; }

  /* Workspace layout */
  .workspace {
    display: grid;
    grid-template-columns: 340px 1fr 360px;
    height: 100%;
  }
  .workspace.no-inspector { grid-template-columns: 340px 1fr 0; }
  .panel {
    background: var(--bg-1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.right { border-right: 0; border-left: 1px solid var(--line); }
  .panel-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 11px;
    font-family: var(--kbd);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-2);
  }
  .panel-body { flex: 1; overflow: auto; padding: 14px; }

  /* Description input */
  .desc-area {
    flex: 1;
    background: transparent;
    color: var(--fg-0);
    border: 0;
    resize: none;
    width: 100%;
    height: 100%;
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    padding: 14px;
    outline: none;
  }
  .desc-area::placeholder { color: var(--fg-3); }
  .panel-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }

  /* Center pane */
  .center {
    display: flex;
    flex-direction: column;
    background: radial-gradient(ellipse at center, #131820 0%, #08090d 70%);
    overflow: hidden;
    position: relative;
  }
  .scene-host {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ─── Explanation Strip ─── */
  .explanation-strip {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg-2, #1e1e2e); border-bottom: 1px solid var(--line, #232a38);
    padding: 10px 14px; min-height: 0; max-height: 80px; overflow: hidden;
    font-size: 12.5px; color: var(--fg-1, #c9c4b8); line-height: 1.45;
    flex-shrink: 0;
  }
  .explanation-strip.confirmed { opacity: 0.7; }
  .explanation-strip.legacy { opacity: 0.55; }
  .ex-icon { font-size: 16px; color: var(--accent, #67e8f9); flex-shrink: 0; margin-top: 1px; }
  .ex-body { flex: 1; }
  .ex-body strong { color: var(--fg-0, #f3efe7); }
  .ex-confirm { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ex-question { font-size: 11px; color: var(--fg-3, #5a5648); }
  .ex-yes, .ex-no { font-size: 11px; padding: 2px 8px; border: 1px solid var(--line, #232a38); border-radius: 4px; cursor: pointer; background: transparent; }
  .ex-yes { color: var(--ok, #5fd49a); border-color: var(--ok, #5fd49a); }
  .ex-no  { color: var(--bad, #ef6262); border-color: var(--bad, #ef6262); }
  .ex-confirmed-badge { font-size: 11px; color: var(--ok, #5fd49a); }
  .scene-toolbar {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    gap: 6px;
    z-index: 5;
    background: rgba(15, 18, 24, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 4px;
  }
  .toggle {
    appearance: none;
    background: transparent;
    color: var(--fg-2);
    border: 0;
    padding: 5px 10px;
    font: inherit;
    font-size: 11.5px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--kbd);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .toggle.on { background: var(--bg-3); color: var(--accent); }
  .toggle:hover { color: var(--fg-0); }

  /* History scrubber */
  .timeline {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: min(720px, calc(100% - 32px));
    background: rgba(15, 18, 24, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 5;
  }
  .timeline-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .timeline-title {
    font-family: var(--kbd);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-2);
  }
  .timeline-controls { display: flex; gap: 4px; align-items: center; }
  .step-btn {
    appearance: none;
    background: var(--bg-2);
    color: var(--fg-1);
    border: 1px solid var(--line);
    width: 26px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .step-btn:hover { background: var(--bg-3); color: var(--fg-0); }
  .speed-pick {
    appearance: none;
    background: var(--bg-2);
    color: var(--fg-1);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 3px 6px;
    font-family: var(--kbd);
    font-size: 11px;
  }
  .scrubber {
    width: 100%;
    appearance: none;
    background: transparent;
    height: 18px;
    position: relative;
  }
  .scrubber-track {
    position: relative;
    height: 4px;
    background: var(--bg-3);
    border-radius: 99px;
    margin: 7px 0;
  }
  .scrubber-fill {
    position: absolute;
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    opacity: 0.8;
  }
  .scrubber-tick {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 99px;
    background: var(--bg-3);
    border: 1.5px solid var(--line-2);
    cursor: pointer;
  }
  .scrubber-tick.active { background: var(--accent); border-color: var(--accent); }
  .scrubber-tick.past { background: var(--fg-2); border-color: var(--fg-2); }
  .scrubber-label {
    position: absolute;
    top: 16px;
    transform: translateX(-50%);
    font-family: var(--kbd);
    font-size: 9.5px;
    color: var(--fg-3);
    white-space: nowrap;
    pointer-events: none;
  }

  /* Inspector */
  .field {
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .field:last-child { border-bottom: 0; }
  .field-label {
    font-family: var(--kbd);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-2);
    margin-bottom: 4px;
  }
  .field-value {
    font-size: 14px;
    color: var(--fg-0);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .field-value.inferred { color: var(--inferred); text-decoration: underline dashed var(--inferred); text-underline-offset: 3px; }
  .field-value .unit { color: var(--fg-2); font-family: var(--kbd); font-size: 12px; }
  .inferred-pill {
    display: inline-flex;
    align-items: center;
    background: rgba(245, 158, 11, 0.12);
    color: var(--inferred);
    border: 1px solid rgba(245, 158, 11, 0.35);
    border-radius: 99px;
    padding: 1px 7px;
    font-family: var(--kbd);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .source-quote {
    color: var(--fg-2);
    font-style: italic;
    font-size: 13px;
    border-left: 2px solid var(--line-2);
    padding-left: 10px;
    margin-top: 4px;
  }
  .num-input {
    background: var(--bg-2);
    color: var(--fg-0);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 8px;
    width: 80px;
    font-family: var(--kbd);
    font-size: 13px;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--fg-2);
    text-align: center;
    padding: 30px;
    gap: 12px;
  }
  .empty .glyph {
    width: 56px; height: 56px;
    border: 1.5px dashed var(--line-2);
    transform: rotate(45deg);
    margin-bottom: 6px;
  }
  .empty-headline {
    color: var(--fg-1);
    font-size: 15px;
    font-weight: 500;
  }
  .empty-hint {
    font-size: 12.5px;
    color: var(--fg-3);
    max-width: 240px;
  }
  .sample-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
    width: 100%;
    max-width: 260px;
  }
  .sample {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 8px 10px;
    text-align: left;
    color: var(--fg-1);
    cursor: pointer;
    font-size: 12.5px;
    line-height: 1.4;
  }
  .sample:hover { background: var(--bg-3); border-color: var(--line-2); color: var(--fg-0); }

  /* Feature list (left of inspector when nothing selected) */
  .feat-list { display: flex; flex-direction: column; gap: 6px; }
  .feat-item {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 12.5px;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .feat-item:hover { background: var(--bg-3); border-color: var(--line-2); }
  .feat-item.selected { background: var(--bg-3); border-color: var(--accent); }
  .feat-item .row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .feat-item .type {
    font-family: var(--kbd);
    font-size: 10px;
    text-transform: uppercase;
    color: var(--fg-2);
  }
  .feat-item .name { color: var(--fg-0); font-weight: 500; }
  .feat-item .meta { color: var(--fg-2); font-family: var(--kbd); font-size: 11px; }

  /* Notices */
  .notice {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.25);
    color: var(--inferred);
    padding: 8px 10px;
    border-radius: 5px;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .notice.error {
    background: rgba(239, 98, 98, 0.08);
    border-color: rgba(239, 98, 98, 0.3);
    color: var(--bad);
  }
  .notice.info {
    background: rgba(103, 232, 249, 0.06);
    border-color: rgba(103, 232, 249, 0.25);
    color: var(--accent);
  }

  /* Reference view */
  .reference {
    height: 100%;
    overflow: auto;
    padding: 28px 32px 60px;
    background: linear-gradient(180deg, #08090d 0%, #0a0d12 100%);
  }
  .ref-intro {
    max-width: 920px;
    margin: 0 auto 24px;
  }
  .ref-intro h1 {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
    color: var(--fg-0);
  }
  .ref-intro p {
    color: var(--fg-2);
    font-size: 14.5px;
    margin: 0 0 4px;
    max-width: 660px;
    line-height: 1.55;
  }
  .ref-section {
    max-width: 1280px;
    margin: 0 auto 36px;
  }
  .ref-section-title {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .ref-section-title .num {
    font-family: var(--kbd);
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.06em;
  }
  .ref-section-title h2 {
    font-size: 17px;
    font-weight: 500;
    margin: 0;
    color: var(--fg-0);
    letter-spacing: -0.01em;
  }
  .ref-section-title .blurb {
    color: var(--fg-2);
    font-size: 13px;
    margin-left: auto;
    font-style: italic;
  }
  .ref-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  .ref-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .ref-card-canvas {
    position: relative;
    aspect-ratio: 4 / 3;
    background: radial-gradient(ellipse at center, #131820 0%, #08090d 80%);
    border-bottom: 1px solid var(--line);
  }
  .ref-card-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ref-card-header {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .ref-card-title {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--fg-0);
  }
  .ref-card-tag {
    font-family: var(--kbd);
    font-size: 10px;
    text-transform: uppercase;
    color: var(--fg-2);
    letter-spacing: 0.06em;
  }
  .ref-card-caption {
    color: var(--fg-2);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .ref-card-overlays {
    margin-top: 4px;
    font-family: var(--kbd);
    font-size: 10.5px;
    color: var(--accent);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .ref-card-overlays .lit { color: var(--fg-3); margin-right: 6px; }

  /* CSS2D labels rendered by Three.js */
  .geo-label {
    font-family: var(--kbd);
    font-size: 11px;
    color: var(--fg-0);
    background: rgba(15, 18, 24, 0.85);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    padding: 3px 7px;
    white-space: nowrap;
    pointer-events: auto;
    transform: translate(8px, -50%);
    cursor: default;
    user-select: none;
    line-height: 1.3;
  }
  .geo-label.inferred {
    color: var(--inferred);
    border-color: rgba(245, 158, 11, 0.4);
    background: rgba(35, 25, 8, 0.85);
  }
  .geo-label .v {
    font-weight: 500;
  }
  .geo-label .v.inferred {
    color: var(--inferred);
    border-bottom: 1px dashed var(--inferred);
    padding-bottom: 1px;
  }
  .geo-label .lbl {
    color: var(--fg-2);
    margin-right: 4px;
  }
  .geo-overlay-value {
    font-family: var(--kbd);
    font-size: 10.5px;
    color: var(--accent);
    background: rgba(8, 14, 18, 0.9);
    padding: 1px 5px;
    border-radius: 3px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    line-height: 1.2;
    white-space: nowrap;
  }
  .geo-overlay-value.inferred {
    color: var(--inferred);
    border-bottom: 1px dashed var(--inferred);
  }
  .geo-overlay-value.muted {
    color: var(--fg-2);
    font-size: 9.5px;
  }
  .geo-compass {
    font-family: var(--kbd);
    font-size: 10px;
    font-weight: 600;
    color: var(--fg-1);
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .geo-compass.n { color: #ef6262; }

  /* H.5: Intrusion cross-cutting age tag badge */
  .intrusion-age-tag { background: rgba(180,120,60,0.85); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-family: monospace; pointer-events: none; transform: translate(-50%, -50%); white-space: nowrap; }

  /* Viewpoint indicator (strike-slip) */
  .vp-indicator { display:flex; align-items:center; gap:6px; background:rgba(8,9,13,0.88); border:1px solid rgba(180,180,180,0.25); padding:5px 9px; border-radius:5px; font-size:11px; color:#c8c8c8; pointer-events:none; }
  .vp-eye { font-size:14px; }
  .vp-text { font-style:italic; }

  /* Mineralisation deposit labels (Phase H.8) */
  .intrusion-stock-lbl { background: rgba(140,80,40,0.85); color: #fff; padding: 2px 5px; border-radius: 3px; font-size: 10px; pointer-events: none; }
  .vms-stringer-lbl, .vms-exhalite-lbl { background: rgba(80,50,20,0.75); color: #ddd; padding: 1px 4px; border-radius: 2px; font-size: 9px; pointer-events: none; }
  .orogenic-carb-lbl { background: rgba(160,140,100,0.75); color: #fff; padding: 1px 4px; border-radius: 2px; font-size: 9px; pointer-events: none; }

  /* Fold axial-plane label (D.2) */
  .fold-axial-lbl { display:flex; flex-direction:column; align-items:center; gap:2px; background:rgba(8,9,13,0.92); border:1px solid rgba(141,180,194,0.3); padding:5px 10px; border-radius:5px; pointer-events:none; transform:translate(-50%,-100%); }
  .fal-type { font-family:'Geist',sans-serif; font-size:10pt; font-weight:500; letter-spacing:0.05em; color:#8db4c2; }
  .fal-age  { font-family:'Geist',sans-serif; font-size:9pt; font-weight:400; color:rgba(141,180,194,0.7); }

  /* Loading / spinner */
  .spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 1.5px solid var(--fg-3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .desc-anchors {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    max-height: 140px;
    overflow: auto;
  }
  .anchor {
    font-size: 12px;
    color: var(--fg-1);
    padding: 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1.45;
  }
  .anchor:hover { background: var(--bg-3); }
  .anchor .src {
    color: var(--fg-2);
    font-style: italic;
  }
  .anchor .tag {
    color: var(--accent);
    font-family: var(--kbd);
    font-size: 10.5px;
    margin-right: 6px;
    text-transform: uppercase;
  }

  /* hidden file input */
  .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 2px solid var(--bg-1); }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-3); }

  /* B.5: HW/FW floating labels */
  .hwfw-label {
    background: rgba(8,9,13,0.92);
    border-radius: 5px;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    width: 92px;
    cursor: pointer;
    pointer-events: auto;
    transform: translate(-50%, -100%);
  }
  .hwfw-hw { border: 1px solid rgba(214,143,255,0.55); }
  .hwfw-fw { border: 1px solid rgba(128,224,192,0.55); }
  .hwfw-long { color: #c9c4b8; font-size: 8px; font-family: 'Geist Mono', monospace; letter-spacing: 0.05em; }
  .hwfw-short { font-size: 12px; font-weight: 600; font-family: 'Geist Mono', monospace; }
  .hwfw-hw .hwfw-short { color: #d68fff; }
  .hwfw-fw .hwfw-short { color: #80e0c0; }

  /* B.5: HW/FW mnemonic tooltip */
  #hwfw-tooltip {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    background: rgba(8,9,13,0.95);
    color: #c9c4b8;
    padding: 10px 14px;
    border-radius: 6px;
    max-width: 280px;
    font-size: 12px;
    line-height: 1.5;
    font-family: var(--sans);
    border: 1px solid #232a38;
    display: none;
  }
  #hwfw-tooltip em { font-style: italic; color: #e2ddd7; }
  #hwfw-tooltip strong { color: #f3efe7; font-weight: 600; }
  .validation-note-pill {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.35);
    padding: 8px 10px;
    border-radius: 5px;
    font-size: 12px;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .vn-icon { font-size: 14px; color: rgba(245,158,11,0.9); }
  .vn-text { color: #d0c8b8; }

  /* ─── Inspector feature explanation ─── */
  .feat-explanation {
    font-size: 13px;
    line-height: 1.55;
    color: var(--fg-1, #cdd6f4);
    background: var(--bg-2, #1e1e2e);
    padding: 10px 12px;
    border-left: 2px solid var(--accent, #89b4fa);
    border-radius: 0 4px 4px 0;
    margin: 10px 0 14px;
  }

  /* C.2: Stress-state badge */
  .stress-badge { display:flex; flex-direction:column; align-items:center; gap:3px; background:rgba(8,9,13,0.92); border-radius:6px; padding:6px 10px; font-family:'Geist Mono',monospace; pointer-events:none; transform:translate(-50%,-50%); }
  .stress-badge--tension { border:1px solid rgba(255,138,101,0.4); }
  .stress-badge--compression { border:1px solid rgba(245,158,11,0.4); }
  .stress-badge--shear { border:1px solid rgba(214,143,255,0.4); }
  .sb-label { font-size:11px; font-weight:600; letter-spacing:0.08em; }
  .stress-badge--tension .sb-label { color:rgba(255,138,101,1); }
  .stress-badge--compression .sb-label { color:rgba(245,158,11,1); }
  .stress-badge--shear .sb-label { color:rgba(214,143,255,1); }
  .sb-sub { font-size:9.5px; color:#a0a0a0; }
  .sb-arrows { font-size:13px; color:#c0c0c0; }

  /* D.4: Monocline underlying-step label */
  .monocline-step-lbl { font-family:'Geist',sans-serif; font-size:9pt; font-weight:400; color:#5a5648; background:rgba(8,9,13,0.85); padding:3px 7px; border-radius:4px; pointer-events:none; transform:translateY(-50%); }

  /* ─── Concept Primer Modal ─── */
  .primer-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(17,17,27,0.75); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .primer-modal {
    background: var(--bg-2, #1e1e2e); border: 1px solid var(--border, #313244);
    border-radius: 12px; padding: 28px 32px; max-width: 820px; width: 95vw;
    max-height: 90vh; overflow-y: auto;
  }
  .primer-title { font-size: 20px; font-weight: 600; color: var(--fg-0, #cdd6f4); margin: 0 0 6px; }
  .primer-lead  { font-size: 13px; color: var(--fg-2, #a6adc8); margin: 0 0 20px; }
  .primer-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .primer-card  { background: var(--bg-3, #181825); border: 1px solid var(--border, #313244); border-radius: 8px; padding: 14px; }
  .primer-card-title { font-size: 13px; font-weight: 600; color: var(--fg-0, #cdd6f4); margin-bottom: 8px; }
  .primer-card-body  { font-size: 12px; color: var(--fg-2, #a6adc8); line-height: 1.5; }
  .primer-card-body p  { margin: 0 0 6px; }
  .primer-card-body ul { margin: 0 0 6px; padding-left: 16px; }
  .primer-card-body li { margin-bottom: 3px; }
  .primer-diagram { width: 100%; height: 64px; margin-top: 8px; opacity: 0.85; }
  .primer-actions { display: flex; justify-content: flex-end; gap: 10px; }
  /* ─── Focus Mode ─── */
  .scene.focus-mode .dim-on-focus {
    opacity: 0.30;
    transition: opacity 200ms ease-out;
  }
  .scene.focus-mode .focus-tag {
    opacity: 1;
    transition: opacity 200ms ease-out;
  }
  .scene .dim-on-focus,
  .scene .focus-tag {
    transition: opacity 200ms ease-out;
  }

  /* ─── Viewport Tab Strip (F.1) ─── */
  .viewtabs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
  }
  .viewtab {
    background: transparent;
    color: var(--fg-2);
    border: 0;
    padding: 6px 12px;
    font-size: 12.5px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .viewtab.active {
    background: var(--bg-3);
    color: var(--fg-0);
  }
  .vt-key {
    font-family: var(--kbd);
    font-size: 10px;
    color: var(--fg-3);
    background: var(--bg-2);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .viewtabs .vt-spacer { flex: 1; }
  .vt-action {
    background: transparent;
    border: 0;
    color: var(--fg-2);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .vt-action:hover { color: var(--accent); }

  /* Cross-section renderer annotations (F.3) */
  .xsection-label { font-family: var(--kbd); font-size: 10px; color: var(--fg-1); pointer-events: none; white-space: nowrap; }
  .xsection-title { font-family: var(--kbd); font-size: 9px; color: var(--fg-3); pointer-events: none; white-space: nowrap; }
  .depth-tick { font-family: var(--kbd); font-size: 9px; color: var(--fg-3); pointer-events: none; }
  .section-badge { font-family: var(--kbd); font-size: 9px; color: var(--accent); padding: 2px 4px; background: var(--bg-2); border-radius: 2px; pointer-events: none; }
  /* Map view annotations (F.4 + F.7) */
  .map-north-arrow { font-family: var(--kbd); font-size: 11px; color: var(--fg-0); text-align: center; line-height: 1.1; pointer-events: none; }
  .map-scale-lbl { font-family: var(--kbd); font-size: 9px; color: var(--fg-3); pointer-events: none; }
  .map-fault-lbl { font-family: var(--kbd); font-size: 9px; color: var(--fg-2); pointer-events: none; white-space: nowrap; }
  .map-dip-lbl { font-family: var(--kbd); font-size: 8px; color: var(--fg-3); pointer-events: none; }
  .map-vpatt-lbl { font-family: var(--kbd); font-size: 9px; color: var(--fg-1); pointer-events: none; white-space: nowrap; }
  /* Borehole readout (G.4) */
  .borehole-readout {
    padding: 10px 14px;
    border-top: 1px solid var(--line, #232a38);
  }
  .borehole-title {
    font-size: 11.5px;
    color: var(--accent, #67e8f9);
    font-family: var(--kbd);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .borehole-table {
    font-size: 11px;
    border-collapse: collapse;
    width: 100%;
    color: var(--fg-2, #8a8a9a);
  }
  .borehole-table th {
    text-align: left;
    font-weight: 600;
    color: var(--fg-1, #c9c4b8);
    padding-bottom: 4px;
  }
  .borehole-table td {
    padding: 2px 0;
  }
  /* H.3 — geological time-scale strip */
  .time-strip-container { margin-top: 12px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; }
  .time-strip { display: flex; height: 20px; border-radius: 3px; overflow: hidden; position: relative; }
  .time-strip-gap { display: flex; align-items: center; padding: 2px 6px; background: rgba(255,255,255,0.1); font-size: 10px; color: #aaa; white-space: nowrap; }
  .time-strip-label { font-size: 10px; color: #999; margin-top: 4px; text-align: center; }
</style>
